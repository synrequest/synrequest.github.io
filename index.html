<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>syn.request</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Source Sans Pro', sans-serif;
            overflow: hidden;
            position: relative;
        }
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            background-color: #000;
            background-size: cover;
            background-position: 50% 50%;
            background-repeat: no-repeat;
            z-index: -1;
        }
        #content {
            text-align: left;
            color: #fff;
            opacity: 0;
            animation: slideInLeft 2s ease forwards;
            position: absolute;
            top: 20px;
            left: 20px;
        }
        h1, h2 {
            margin: 0;
            padding: 0;
        }
        h1 {
            font-size: 120px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 36px;
            font-weight: 400;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 10px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            transition: transform 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.1);
        }
        #video-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #video-placeholder {
            width: 400px;
            height: 300px;
            background-color: #222;
            margin: 0 10px;
        }
        #left-btn, #right-btn {
            font-size: 24px;
            padding: 10px 20px;
            background-color: #333;
            border: none;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }

        @keyframes slideInLeft {
            0% {
                opacity: 0;
                left: -100%;
            }
            100% {
                opacity: 1;
                left: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div id="content">
        <h1>synrequest</h1>
        <h2>Computer Science Student</h2>
        <h2>Roblox Developer</h2>
    </div>
    <div id="video-container">
        <button id="left-btn" onclick="changeVideo(-1)">Left</button>
        <div id="video-placeholder"></div>
        <button id="right-btn" onclick="changeVideo(1)">Right</button>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const videoContainer = document.getElementById('video-placeholder');
        const leftButton = document.getElementById('left-btn');
        const rightButton = document.getElementById('right-btn');
        let currentVideo = 1;

        function changeVideo(direction) {
            currentVideo += direction;
            if (currentVideo < 1) {
                currentVideo = 4;
            } else if (currentVideo > 4) {
                currentVideo = 1;
            }
            videoContainer.innerHTML = `<video width="400" height="300" controls autoplay loop>
                <source src="${currentVideo}.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>`;
        }
    </script>
</body>
</html>
